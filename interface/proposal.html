<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Förderantrag - Antrag stellen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }
        h1 {
            color: #007bff;
            margin-bottom: 20px;
        }
        .form-section {
            margin-bottom: 30px;
        }
        .form-section h3 {
            color: #007bff;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">GrantScout</a>
    </div>
</nav>

<div class="container">
    <span style="font-size: 16px; color: grey; font-style: italic;">Förderantrag für das Projekt</span>
    <h1 id="ausschreibungName"></h1>
    <form>
        <div class="form-section">
            <h3>Allgemeine Informationen</h3>
            <div class="mb-3">
                <label for="name" class="form-label">Antragsteller Name</label>
                <input type="text" class="form-control" id="name" placeholder="Name der Organisation/Unternehmen" required>
            </div>
            <div class="mb-3">
                <label for="contactPerson" class="form-label">Kontaktperson</label>
                <input type="text" class="form-control" id="contactPerson" placeholder="Name der Kontaktperson" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">E-Mail</label>
                <input type="email" class="form-control" id="email" placeholder="E-Mail-Adresse" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Telefon</label>
                <input type="tel" class="form-control" id="phone" placeholder="Telefonnummer" required>
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Adresse</label>
                <input type="text" class="form-control" id="address" placeholder="Straße, Stadt, PLZ" required>
            </div>
            <div class="mb-3">
                <label for="website" class="form-label">Webseite</label>
                <input type="url" class="form-control" id="website" placeholder="Website (optional)">
            </div>
        </div>

        <div class="form-section">
            <h3>Projektinformationen</h3>
            <div class="mb-3">
                <label for="projectTitle" class="form-label">Projekttitel</label>
                <input type="text" class="form-control" id="projectTitle" placeholder="Titel des Projekts" required>
            </div>
            <div class="mb-3">
                <label for="projectDescription" class="form-label">Projektbeschreibung</label>
                <textarea class="form-control" id="projectDescription" rows="4" placeholder="Beschreibung des Projekts" required></textarea>
            </div>
            <div class="mb-3">
                <label for="startDate" class="form-label">Projektbeginn</label>
                <input type="date" class="form-control" id="startDate" required>
            </div>
            <div class="mb-3">
                <label for="endDate" class="form-label">Projektende</label>
                <input type="date" class="form-control" id="endDate" required>
            </div>
            <div class="mb-3">
                <label for="fundingAmount" class="form-label">Beantragter Förderbetrag</label>
                <input type="number" class="form-control" id="fundingAmount" placeholder="Förderbetrag in Euro" required>
            </div>
            <div class="mb-3">
                <label for="fundingPercentage" class="form-label">Förderquote</label>
                <input type="number" class="form-control" id="fundingPercentage" placeholder="Förderquote (%)" required>
            </div>
        </div>

        <div class="form-section">
            <h3>Finanzierungsplan</h3>
            <div class="mb-3">
                <label for="totalCost" class="form-label">Gesamtkosten des Projekts</label>
                <input type="number" class="form-control" id="totalCost" placeholder="Gesamtkosten in Euro" required>
            </div>
            <div class="mb-3">
                <label for="ownContribution" class="form-label">Eigenmittel</label>
                <input type="number" class="form-control" id="ownContribution" placeholder="Eigenmittel in Euro" required>
            </div>
            <div class="mb-3">
                <label for="thirdPartyFunding" class="form-label">Drittmittel / Co-Funding</label>
                <input type="number" class="form-control" id="thirdPartyFunding" placeholder="Co-Funding in Euro" required>
            </div>
        </div>

        <div class="form-section">
            <h3>Meilensteine und Zeitplan</h3>
            <div class="mb-3">
                <label for="milestones" class="form-label">Projektmeilensteine</label>
                <textarea class="form-control" id="milestones" rows="4" placeholder="Wichtige Meilensteine des Projekts" required></textarea>
            </div>
            <div class="mb-3">
                <label for="timeline" class="form-label">Projektzeitrahmen</label>
                <input type="text" class="form-control" id="timeline" placeholder="Geben Sie die Phasen und Zeitrahmen an" required>
            </div>
        </div>

        <div class="form-section">
            <h3>Risikoanalyse</h3>
            <div class="mb-3">
                <label for="risks" class="form-label">Mögliche Risiken</label>
                <textarea class="form-control" id="risks" rows="4" placeholder="Identifizieren Sie Risiken und Strategien zur Risikominderung"></textarea>
            </div>
        </div>

        <div class="form-section">
            <h3>Dokumente und Anhänge</h3>
            <div class="mb-3">
                <label for="documents" class="form-label">Projektplan und Budget</label>
                <input type="file" class="form-control" id="documents">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Antrag einreichen</button>
    </form>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const jsonFileName = params.get('json');

    fetch("mock/" + jsonFileName)
        .then(response => response.json())
        .then(ausschreibung => {
            document.getElementById("ausschreibungName").textContent = ausschreibung.Name;
        })
        .catch(error => console.error('Fehler beim Laden der Details:', error));
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
