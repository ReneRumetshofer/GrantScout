services:
  postgres:
    image: postgres:13
    container_name: database
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    expose:
      - 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  scraping:
    image: openjdk:11
    container_name: scraping
    build:
      context: ./scraping
    volumes:
      - ./scraping:/app
    working_dir: /app
    command: ./gradlew run
    expose:
      - 8080
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      - postgres
    networks:
      - backend

  parsing:
    image: python:3.9
    container_name: parsing
    build:
      context: ./parsing
    volumes:
      - ./parsing:/app
    working_dir: /app
    command: python app.py
    expose:
      - 5000
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      - postgres
    networks:
      - backend

  frontend:
    image: nginx:latest
    container_name: frontend
    volumes:
      - ./interface/nginx.conf:/etc/nginx/nginx.conf
      - ./interface/src:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - postgres
      - scraping
      - parsing
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
    driver: local
